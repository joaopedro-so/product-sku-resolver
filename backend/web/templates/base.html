<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Dashboard SKU{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/dashboard/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!--
        Estrutura global:
        A barra superior cria um contexto mais comercial e confiavel, enquanto
        o header principal concentra marca e navegacao para manter consistencia
        entre todas as telas do dashboard.
      -->
      <div class="utility-strip">
        <div class="utility-strip__content">
          <div class="utility-strip__text">
            <strong>Operacao de catalogo</strong>
            <span>Monitoramento visual e atualizacao manual de SKU em um fluxo mais claro.</span>
          </div>
          <span class="utility-strip__badge">Retail Ops</span>
        </div>
      </div>

      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand-lockup" href="/dashboard">
            <span class="brand-lockup__mark">SR</span>
            <span>
              <span class="brand-lockup__title">Product SKU Resolver</span>
              <span class="brand-lockup__subtitle">Painel operacional com foco em clareza comercial</span>
            </span>
          </a>

          <nav class="site-nav" aria-label="Navegacao principal do dashboard">
            <a
              class="site-nav__link {% if request.url.path == '/dashboard' %}site-nav__link--active{% endif %}"
              href="/dashboard"
            >
              Dashboard
            </a>
            <a
              class="site-nav__link {% if request.url.path == '/dashboard/products/new' %}site-nav__link--active{% endif %}"
              href="/dashboard/products/new"
            >
              Adicionar produto
            </a>
          </nav>
        </div>
      </header>

      <main class="page-shell">
        {% block page_intro %}{% endblock %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
