<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ page_title or 'Perfumaria Prestígio 394' }}{% endblock %}</title>
    <meta name="theme-color" content="#fcfbf9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="/dashboard/static/brand/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/dashboard/static/brand/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/dashboard/static/brand/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/dashboard/static/brand/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/dashboard/static/brand/apple-touch-icon.png" />
    <link rel="manifest" href="/dashboard/static/brand/manifest.webmanifest" />
    <link rel="stylesheet" href="/dashboard/static/styles.css" />
  </head>
  <body class="{{ body_class or '' }}">
    <div class="mobile-shell">
      {% if not hide_app_chrome %}
      <header class="app-header">
        <div class="app-header__row">
          <a class="brand brand--minimal" href="/dashboard" aria-label="Prestígio 394">
            <img class="brand__symbol" src="/dashboard/static/brand/prestigio-394-mark.svg" alt="Símbolo Prestígio 394" />
            <span class="brand__name">Prestígio 394</span>
          </a>

          <div class="header-create" data-create-root>
            <div class="header-create__menu" id="header-create-menu" aria-label="Ações de criação rápidas">
              <a class="header-create__action" href="/dashboard/products/new#autofill">
                <span class="header-create__action-label">Importar do site</span>
              </a>
              <a class="header-create__action" href="/dashboard/products/new#manual">
                <span class="header-create__action-label">Cadastrar manualmente</span>
              </a>
            </div>
            <button
              class="header-create__button"
              type="button"
              aria-label="Criar novo item"
              aria-expanded="false"
              aria-controls="header-create-menu"
              data-create-trigger
            >
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"/>
              </svg>
            </button>
          </div>
        </div>
      </header>
      {% endif %}

      <main class="app-main">
        {% block content %}{% endblock %}
      </main>

      {% if not hide_app_chrome %}
      <nav class="bottom-nav" aria-label="Navegação principal">
        <a class="bottom-nav__item {% if active_tab == 'home' %}bottom-nav__item--active{% endif %}" href="/dashboard">
          <span class="bottom-nav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4.75 10.25 12 4.5l7.25 5.75V19a1.75 1.75 0 0 1-1.75 1.75h-11A1.75 1.75 0 0 1 4.75 19v-8.75Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
              <path d="M9.25 20.75v-5.5h5.5v5.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
            </svg>
          </span>
          <span>Início</span>
        </a>
        <a class="bottom-nav__item {% if active_tab == 'search' %}bottom-nav__item--active{% endif %}" href="/dashboard/search">
          <span class="bottom-nav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="11" cy="11" r="5.75" fill="none" stroke="currentColor" stroke-width="1.8"/>
              <path d="m16 16 3.75 3.75" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8"/>
            </svg>
          </span>
          <span>Buscar</span>
        </a>
        <a class="bottom-nav__item {% if active_tab == 'updates' %}bottom-nav__item--active{% endif %}" href="/dashboard/updates">
          <span class="bottom-nav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M18.25 8.5V4.75H14.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
              <path d="M5.75 15.5v3.75H9.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
              <path d="M18 10a6.75 6.75 0 0 0-11.38-2.97L5.75 7.9M6 14a6.75 6.75 0 0 0 11.38 2.97l.87-.87" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
            </svg>
          </span>
          <span>Sync</span>
        </a>
        <a class="bottom-nav__item {% if active_tab == 'saved' %}bottom-nav__item--active{% endif %}" href="/dashboard/saved">
          <span class="bottom-nav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M7.25 4.75h9.5A1.75 1.75 0 0 1 18.5 6.5v13.25L12 16l-6.5 3.75V6.5a1.75 1.75 0 0 1 1.75-1.75Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8"/>
            </svg>
          </span>
          <span>Salvos</span>
          {% if saved_count %}
          <strong>{{ saved_count }}</strong>
          {% endif %}
        </a>
      </nav>
      {% endif %}
    </div>

    <script src="/dashboard/static/dashboard.js" defer></script>
  </body>
</html>
