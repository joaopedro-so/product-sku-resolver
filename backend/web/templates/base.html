<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ page_title or 'SKU Resolver' }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/dashboard/static/styles.css" />
  </head>
  <body class="{{ body_class or '' }}">
    <div class="mobile-shell">
      {% if not hide_app_chrome %}
      <header class="app-header">
        <div class="app-header__row">
          <a class="brand" href="/dashboard">
            <span class="brand__mark">SR</span>
            <span>
              <strong class="brand__title">SKU Resolver</strong>
              <span class="brand__subtitle">Catálogo operacional</span>
            </span>
          </a>
          <a class="button button--ghost button--small" href="/dashboard/products/new">Novo</a>
        </div>
      </header>
      {% endif %}

      <main class="app-main">
        {% block content %}{% endblock %}
      </main>

      {% if not hide_app_chrome %}
      <nav class="bottom-nav" aria-label="Navegação principal">
        <a class="bottom-nav__item {% if active_tab == 'home' %}bottom-nav__item--active{% endif %}" href="/dashboard">
          <span>Início</span>
        </a>
        <a class="bottom-nav__item {% if active_tab == 'search' %}bottom-nav__item--active{% endif %}" href="/dashboard/search">
          <span>Buscar</span>
        </a>
        <a class="bottom-nav__item {% if active_tab == 'updates' %}bottom-nav__item--active{% endif %}" href="/dashboard/updates">
          <span>Atualizações</span>
        </a>
        <a class="bottom-nav__item {% if active_tab == 'saved' %}bottom-nav__item--active{% endif %}" href="/dashboard/saved">
          <span>Salvos</span>
          {% if saved_count %}
          <small>{{ saved_count }}</small>
          {% endif %}
        </a>
      </nav>
      {% endif %}
    </div>

    <script src="/dashboard/static/dashboard.js" defer></script>
  </body>
</html>
